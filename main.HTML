<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namibian Land Claim Portal - Omusati Region</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --hearing: #9b59b6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #ecf0f1; color: #333; }

        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-box input, .login-box select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-hint { font-size: 11px; color: #888; margin-top: 8px; text-align: left; line-height: 1.5; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; background: var(--secondary); color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 13px; }
        .btn:hover { opacity: 0.9; }

        /* Main App Layout */
        #app-screen { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        header a { color: #a4cbed; text-decoration: none; font-size: 0.9em; }
        header a:hover { text-decoration: underline; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.05); z-index: 2; }

        .map-wrapper { position: relative; flex: 1; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }

       /*Browser Alerts for cOde*/
        .map-toast {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 1100; padding: 14px 28px; border-radius: 8px;
            color: white; font-weight: 600; font-size: 14px; max-width: 500px; text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35); pointer-events: none;
            opacity: 0; transition: opacity 0.35s ease;
        }
        .map-toast.show  { opacity: 1; }
        .map-toast.success { background: var(--success); }
        .map-toast.error   { background: var(--danger); }
        .map-toast.warning { background: var(--warning); }
        .map-toast.info    { background: var(--secondary); }

        /* ─── Map dialog overlay */
        .map-dialog-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45); z-index: 1200;
            display: none; justify-content: center; align-items: center;
        }
        .map-dialog-overlay.show { display: flex; }
        .map-dialog-box {
            background: white; padding: 24px; border-radius: 10px;
            max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }
        .map-dialog-box p { margin: 0 0 16px; font-size: 14px; line-height: 1.5; white-space: pre-line; }
        .map-dialog-box textarea {
            width: 100%; padding: 10px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px; margin-bottom: 14px;
            font-family: inherit; font-size: 13px; resize: vertical;
        }
        .dialog-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .dialog-btns .btn { width: auto; margin-top: 0; padding: 9px 20px; }
        .btn-cancel { background: #7f8c8d !important; }

        /* Claim Cards */
        .claim-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 6px; background: #f9f9f9; cursor: pointer; transition: box-shadow 0.2s; }
        .claim-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .claim-card h3 { margin: 0 0 10px 0; font-size: 16px; }
        .claim-card p { margin: 5px 0; font-size: 14px; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; font-weight: bold; }
        .status-pending   { background: var(--warning); }
        .status-approved  { background: var(--success); }
        .status-rejected  { background: var(--danger); }
        .status-hearing   { background: var(--hearing); }
        .rejection-reason { color: #e74c3c; font-size: 12px; margin-top: 4px; padding: 6px; background: #fdecea; border-radius: 4px; }

        /* Admin Popup Form (inside Leaflet map popups) */
        .admin-action-form { margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; }
        .admin-action-form input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-approve { background: var(--success); width: 48%; }
        .btn-reject  { background: var(--danger);  width: 48%; }
        .btn-logout  { background: #7f8c8d; width: auto; padding: 8px 15px; }
        .btn-remove  { background: var(--danger); font-size: 12px; padding: 5px 10px; width: auto; margin-top: 8px; }
        .btn-dismiss { background: #7f8c8d; font-size: 12px; padding: 5px 10px; width: auto; margin-top: 8px; }
    </style>
</head>
<body>

    <!-- ═══════════ LOGIN SCREEN ═══════════ -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Portal Login</h2>
            <select id="role-select">
                <option value="citizen">Citizen of Namibia</option>
                <option value="ta">Traditional Authority (TA) Admin</option>
                <option value="clb">Communal Land Board (CLB) Admin</option>
            </select>
            <input type="text"     id="email-input"    placeholder="Email / Username">
            <input type="password" id="password-input" placeholder="Password">
            <button class="btn" onclick="login()">Access System</button>
            <div class="login-hint">
                <b>Citizen:</b> any email &middot; password: <code>citizen123</code><br>
                <b>TA Admin:</b> ta@omusati.na &middot; password: <code>ta_pass_789</code><br>
                <b>CLB Admin:</b> clb@omusati.na &middot; password: <code>clb_pass_456</code>
            </div>
        </div>
    </div>

    <!-- ═══════════ APP SCREEN ═══════════ -->
    <div id="app-screen">
        <header>
            <div>
                <h2 id="header-title" style="margin: 0;">Namibian Land Claim Portal</h2>
                <span id="user-info" style="font-size: 0.9em; color: #bdc3c7;"></span>
            </div>
            <div>
                <a href="https://www.lac.org.na/laws/annoSTAT/Communal%20Land%20Reform%20Act%205%20of%202002.pdf" target="_blank">View Namibian Land Claim Guidelines</a>
                <button class="btn btn-logout" style="margin-left: 15px;" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="main-container">
            <div class="sidebar">
                <h3 id="sidebar-title">My Claims</h3>
                <div id="claims-list"></div>
            </div>

            <!-- Map wrapper: toast and dialog are positioned inside here -->
            <div class="map-wrapper">
                <div id="map"></div>
                <div id="map-toast" class="map-toast"></div>
                <div id="map-dialog-overlay" class="map-dialog-overlay">
                    <div class="map-dialog-box" id="map-dialog-box"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════ LIBRARIES ═══════════ -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <script>
    // ══════════════════════════════════════════════════════════════════════════
    //  SYSTEM STATE & DATABASE
    // ══════════════════════════════════════════════════════════════════════════
    const db = new PouchDB('omusati_land_registry');
    let currentUser = null;           // { role, email }

    let map, drawControl;
    const allMapLayers = new L.FeatureGroup();
    let savedFeatures  = [];          // Active claim geometries for collision detection
    let claimLayerMap  = {};          // claim._id → Leaflet layer (click-to-navigate)
    let waterPolygons  = [];          // Turf polygon features for water bodies
    let waterMapLayer  = null;        // Leaflet layer group for rendered water overlays

    // Debounce timer for loadClaims – prevents double-rendering
    let _loadClaimsTimer = null;

    // ── Credentials ──────────────────────────────────────────────────────────
    const CREDENTIALS = {
        citizen: { password: 'citizen123' },
        ta:      { email: 'ta@omusati.na',  password: 'ta_pass_789'  },
        clb:     { email: 'clb@omusati.na', password: 'clb_pass_456' }
    };

    // Geographic constants
    const bounds = turf.polygon([[
    [14.2874, -17.3881],
    [15.5591, -17.3885],
    [15.6389, -17.5977],
    [15.4998, -18.1512],
    [15.5633, -18.6232],
    [15.5136, -18.9830],
    [15.3173, -19.1635],
    [14.5362, -19.2467],
    [14.4060, -19.2148],
    [14.3036, -18.6622],
    [14.2903, -18.0792],
    [14.1509, -17.7209],
    [14.1366, -17.5667],
    [14.2160, -17.4430],
    [14.2874, -17.3881]
]]);

    // Omusati service-region border (approximate) — drawn on map as dashed line
    const omusatiCoords = [
    [-17.3881, 14.2874],
    [-17.3885, 15.5591],
    [-17.5977, 15.6389],
    [-18.1512, 15.4998],
    [-18.6232, 15.5633],
    [-18.9830, 15.5136],
    [-19.1635, 15.3173],
    [-19.2467, 14.5362],
    [-19.2148, 14.4060],
    [-18.6622, 14.3036],
    [-18.0792, 14.2903],
    [-17.7209, 14.1509],
    [-17.5667, 14.1366],
    [-17.4430, 14.2160],
    [-17.3881, 14.2874]
];


    // ══════════════════════════════════════════════════════════════════════════
    //  CUSTOM MAP NOTIFICATIONS (replace browser alert / confirm / prompt)
    // ══════════════════════════════════════════════════════════════════════════

    /** Toast notification that appears over the map */
    function notify(message, type = 'info', duration = 4000) {
        const el = document.getElementById('map-toast');
        el.textContent = message;
        el.className = 'map-toast ' + type;          // set colour class
        void el.offsetWidth;                          // force reflow
        el.classList.add('show');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), duration);
    }

    /** Confirm dialog over the map – returns Promise<boolean> */
    function mapConfirm(message) {
        return new Promise(resolve => {
            const overlay = document.getElementById('map-dialog-overlay');
            const box     = document.getElementById('map-dialog-box');
            box.innerHTML = `
                <p>${message}</p>
                <div class="dialog-btns">
                    <button class="btn btn-cancel" id="dlg-no">Cancel</button>
                    <button class="btn"           id="dlg-yes">Confirm</button>
                </div>`;
            overlay.classList.add('show');
            const close = val => { overlay.classList.remove('show'); resolve(val); };
            document.getElementById('dlg-yes').onclick = () => close(true);
            document.getElementById('dlg-no').onclick  = () => close(false);
        });
    }

    /** Prompt dialog over the map – returns Promise<string|null> */
    function mapPrompt(message) {
        return new Promise(resolve => {
            const overlay = document.getElementById('map-dialog-overlay');
            const box     = document.getElementById('map-dialog-box');
            box.innerHTML = `
                <p>${message}</p>
                <textarea id="dlg-input" rows="3" placeholder="Enter your response here..."></textarea>
                <div class="dialog-btns">
                    <button class="btn btn-cancel" id="dlg-cancel">Cancel</button>
                    <button class="btn"           id="dlg-ok">Submit</button>
                </div>`;
            overlay.classList.add('show');
            const close = val => { overlay.classList.remove('show'); resolve(val); };
            document.getElementById('dlg-ok').onclick     = () => close(document.getElementById('dlg-input').value);
            document.getElementById('dlg-cancel').onclick = () => close(null);
        });
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  1. AUTHENTICATION
    // ══════════════════════════════════════════════════════════════════════════
    function login() {
        const role     = document.getElementById('role-select').value;
        const email    = document.getElementById('email-input').value.trim();
        const password = document.getElementById('password-input').value;

        if (!email)    return alert("Please enter an email/username.");
        if (!password) return alert("Please enter a password.");

        // Validate credentials per role
        if (role === 'citizen') {
            if (password !== CREDENTIALS.citizen.password)
                return alert("Invalid password. Access denied.");
        } else if (role === 'ta') {
            if (email !== CREDENTIALS.ta.email || password !== CREDENTIALS.ta.password)
                return alert("Invalid TA Admin credentials. Access denied.");
        } else if (role === 'clb') {
            if (email !== CREDENTIALS.clb.email || password !== CREDENTIALS.clb.password)
                return alert("Invalid CLB Admin credentials. Access denied.");
        }

        currentUser = { role, email };

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display   = 'flex';

        document.getElementById('header-title').innerText =
            role === 'citizen' ? "MunyaMap Land Portal" :
            role === 'ta'      ? "MunyaMap: Traditional Authority Admin Portal" :
                                 "MunyaMap: Communal Land Board Admin Portal";
        document.getElementById('sidebar-title').innerText =
            role === 'citizen' ? "My Claims" : "All System Claims";
        document.getElementById('user-info').innerText = `Logged in as: ${email}`;

        initMap();
        loadClaims();   // initial load (debounced listener handles subsequent updates)
    }

    function logout() {
        currentUser   = null;
        claimLayerMap = {};
        document.getElementById('app-screen').style.display   = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        if (map) { map.remove(); map = null; }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  2. MAP INITIALIZATION
    // ══════════════════════════════════════════════════════════════════════════
    function initMap() {
        map = L.map('map', { zoomControl: true }).setView([-17.45, 14.68], 12);

        // ── Base layer: standard OpenStreetMap (shows water in blue) ──
        const osmBase = L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors',
                // 1×1 transparent PNG as error-tile – prevents "map data no longer appears"
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
            }
        );

        // ── Overlay: ESRI satellite imagery at 65 % opacity ──
        const satOverlay = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            {
                maxZoom: 19,
                maxNativeZoom: 17,
                opacity: 0.65,
                attribution: '&copy; Esri, Maxar, Earthstar Geographics',
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
            }
        );

        osmBase.addTo(map);
        satOverlay.addTo(map);

        // Layer control so user can toggle satellite overlay
        L.control.layers(null, { 'Satellite Overlay': satOverlay }).addTo(map);

        map.addLayer(allMapLayers);

        // ── Draw Omusati service-region border ──
        L.polygon(omusatiCoords, {
            color: '#e67e22', weight: 2.5, dashArray: '10,6',
            fillOpacity: 0, interactive: false
        }).addTo(map).bindTooltip('Omusati Service Region', { permanent: false, direction: 'center' });

        // ── Fetch live water bodies from OpenStreetMap (Overpass API) ──
        fetchWaterBodies();

        // Fix Leaflet rendering after container becomes visible
        setTimeout(() => map.invalidateSize(), 200);

        // ── Drawing tools (citizens only) ──
        if (currentUser.role === 'citizen') {
            drawControl = new L.Control.Draw({
                edit: false,
                draw: {
                    marker:       false,
                    circle:       false,
                    circlemarker: false,
                    polyline:     false,
                    rectangle:    false,   // prevents unwanted blue square
                    polygon:      true
                }
            });
            map.addControl(drawControl);

            map.on(L.Draw.Event.CREATED, async function (event) {
                const newGeoJSON    = event.layer.toGeoJSON();
                const areaHectares  = turf.area(newGeoJSON) / 10000;

                // Validation 1 – Size limit (CLRA max 50 ha)
                if (areaHectares > 50) {
                    return notify(`Claim Denied: Your plot is ${areaHectares.toFixed(2)} ha. Maximum allowed by CLRA is 50 ha.`, 'error', 5000);
                }

                // Validation 2 – Must be inside Omusati coords
                if (!turf.booleanContains(bounds, turf.feature(newGeoJSON.geometry))) {
                    return notify("Claim Denied: Your claim must be located within the Omusati region.", 'error', 5000);
                }

                // Validation 3 – No water bodies
                const hitsWater = waterPolygons.some(wp => {
                    try { return turf.booleanIntersects(newGeoJSON, wp); } catch(e) { return false; }
                });
                if (hitsWater) {
                    return notify("Claim Denied: Your claim overlaps with a body of water.", 'error', 5000);
                }

                // Validation 4 – Existing claim overlap → offer hearing request
                const overlaps = savedFeatures.some(f => turf.booleanIntersects(newGeoJSON, f));
                if (overlaps) {
                    const wantHearing = await mapConfirm(
                        "Your claim overlaps with an existing claim.\n\n" +
                        "You cannot submit a standard claim here.\n\n" +
                        "Would you like to submit a formal hearing request instead?"
                    );
                    if (wantHearing) await createHearingRequest(newGeoJSON.geometry, areaHectares);
                    return;
                }

                // All validations passed
                await createNewClaim(newGeoJSON.geometry, areaHectares);
            });
        }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  WATER BODY MANAGEMENT
    // ══════════════════════════════════════════════════════════════════════════

    /** Render all known water polygons as blue overlays on the map */
    function renderWaterOverlay() {
        if (waterMapLayer) map.removeLayer(waterMapLayer);
        waterMapLayer = L.layerGroup();
        waterPolygons.forEach(wp => {
            try {
                L.geoJSON(wp, {
                    style: { color: '#0077be', weight: 1, fillOpacity: 0.25, fillColor: '#2196F3' },
                    interactive: false
                }).addTo(waterMapLayer);
            } catch(e) { /* skip bad geometries */ }
        });
        waterMapLayer.addTo(map);
    }

    /** Fetch water bodies from OpenStreetMap via Overpass API for the Omusati region */
    async function fetchWaterBodies() {
        try {
            // south, west, north, east  (Omusati region bbox)
            const bbox  = '-18.6,13.7,-17.2,15.8';
            const query = `[out:json][timeout:30];(way["natural"="water"](${bbox});relation["natural"="water"](${bbox});way["waterway"="riverbank"](${bbox}););out geom;`;
            const resp  = await fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query));
            if (!resp.ok) throw new Error('Overpass API error');
            const data = await resp.json();

            let added = 0;
            data.elements.forEach(el => {
                // Process ways directly
                if (el.type === 'way' && el.geometry && el.geometry.length >= 4) {
                    const poly = wayGeomToTurf(el.geometry);
                    if (poly) { waterPolygons.push(poly); added++; }
                }
                // Process relation outer members
                if (el.type === 'relation' && el.members) {
                    el.members.forEach(m => {
                        if (m.role === 'outer' && m.geometry && m.geometry.length >= 4) {
                            const poly = wayGeomToTurf(m.geometry);
                            if (poly) { waterPolygons.push(poly); added++; }
                        }
                    });
                }
            });

            if (added > 0) renderWaterOverlay();
            console.log(`Loaded ${added} water body polygons from OpenStreetMap.`);
        } catch (e) {
            console.warn('Water body fetch failed — using fallback polygons.', e);
        }
    }

    /** Convert an Overpass way geometry array [{lat,lon},...] → Turf polygon (or null) */
    function wayGeomToTurf(geom) {
        try {
            const coords = geom.map(g => [g.lon, g.lat]);
            // Close the ring if needed
            const first = coords[0], last = coords[coords.length - 1];
            if (first[0] !== last[0] || first[1] !== last[1]) coords.push([first[0], first[1]]);
            if (coords.length < 4) return null;
            return turf.polygon([coords]);
        } catch(e) { return null; }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  3. CLAIM CREATION
    // ══════════════════════════════════════════════════════════════════════════
    async function createNewClaim(geometry, hectares) {
        const taCryptoKey  = Math.random().toString(36).substring(2, 10).toUpperCase();
        const clbCryptoKey = Math.random().toString(36).substring(2, 10).toUpperCase();

        const claim = {
            _id:          'claim_' + new Date().toISOString() + '_' + Math.random().toString(36).substring(2, 6),
            claimerEmail: currentUser.email,
            date:         new Date().toLocaleDateString(),
            area:         hectares.toFixed(2),
            boundary:     geometry,
            taCryptoKey,
            clbCryptoKey,
            status:       'pending_ta',
            type:         'land_claim'
        };

        await db.put(claim);
        notify("Claim Submitted! Awaiting Traditional Authority (TA) approval.", 'success');
        // loadClaims() fires via the debounced db.changes listener — no explicit call here
    }

    async function createHearingRequest(geometry, hectares) {
        const claim = {
            _id:          'claim_' + new Date().toISOString() + '_' + Math.random().toString(36).substring(2, 6),
            claimerEmail: currentUser.email,
            date:         new Date().toLocaleDateString(),
            area:         hectares.toFixed(2),
            boundary:     geometry,
            taCryptoKey:  '',
            clbCryptoKey: '',
            status:       'hearing_requested',
            type:         'land_claim'
        };
        await db.put(claim);
        notify("Hearing request submitted. You will be contacted with hearing details.", 'info');
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  4. RENDER CLAIMS  (MAP & SIDEBAR)
    //     – debounced so rapid db.changes events don't cause duplicates
    // ══════════════════════════════════════════════════════════════════════════

    function scheduleLoadClaims() {
        clearTimeout(_loadClaimsTimer);
        _loadClaimsTimer = setTimeout(loadClaims, 120);
    }

    async function loadClaims() {
        if (!map || !currentUser) return;

        allMapLayers.clearLayers();
        savedFeatures = [];
        claimLayerMap = {};

        const result = await db.allDocs({ include_docs: true });

        let sidebarHTML = '';     // build sidebar HTML in one pass, set once at the end

        result.rows.forEach(row => {
            const claim = row.doc;
            if (claim.type !== 'land_claim') return;

            const isOwnClaim = claim.claimerEmail === currentUser.email;
            const isAdmin    = currentUser.role === 'ta' || currentUser.role === 'clb';

            // ── Rejected-claim visibility rules ──
            // Rejected claims ONLY visible to the citizen who owns them.
            // They do NOT appear on TA or CLB portals at all.
            if (claim.status === 'rejected') {
                if (!isOwnClaim || isAdmin) return;          // skip entirely for admins & other citizens
            }

            // Collision detection: only active (non-rejected) claims
            if (claim.status !== 'rejected') {
                savedFeatures.push(turf.feature(claim.boundary));
            }

            // Sidebar visibility: citizens see only their own; admins see all (except rejected, filtered above)
            const showInSidebar = isAdmin || isOwnClaim;

            // color coding 
            let color;
            if (currentUser.role === 'citizen' && !isOwnClaim) {
                color = '#393D47';     
            } else if (claim.status === 'approved')          { color = '#27ae60'; }
              else if (claim.status === 'rejected')          { color = '#e74c3c'; }
              else if (claim.status === 'hearing_requested') { color = '#9b59b6'; }
              else                                           { color = '#f39c12'; }

            // Add polygon to map
            const layer = L.geoJSON(claim.boundary, {
                style: { color, weight: 2, fillOpacity: 0.4 }
            });

            let popupContent = `
                <b>Claim ID:</b> ${shortId(claim._id)}<br>
                <b>Claimer:</b> ${claim.claimerEmail}<br>
                <b>Area:</b> ${claim.area} ha<br>
                <b>Status:</b> ${claim.status.replace(/_/g, ' ').toUpperCase()}<br>
            `;
            if (claim.status === 'rejected' && claim.rejectionReason) {
                popupContent += `<b style="color:#e74c3c;">Reason:</b> ${claim.rejectionReason}<br>`;
            }

            // Admin verification form 
            if ((currentUser.role === 'ta'  && claim.status === 'pending_ta') ||
                (currentUser.role === 'clb' && claim.status === 'pending_clb')) {
                popupContent += `
                    <div class="admin-action-form">
                        <input type="text" id="key-${claim._id}" placeholder="Enter Crypto Key to Verify">
                        <button class="btn btn-approve" onclick="verifyAndApprove('${claim._id}','${currentUser.role}')">Approve</button>
                        <button class="btn btn-reject"  onclick="rejectClaim('${claim._id}','${currentUser.role}')">Deny</button>
                    </div>`;
            }

            layer.bindPopup(popupContent);
            allMapLayers.addLayer(layer);
            claimLayerMap[claim._id] = layer;

            // ── Sidebar card ──
            if (!showInSidebar) return;

            const badgeClass =
                claim.status === 'approved'          ? 'status-approved' :
                claim.status === 'rejected'          ? 'status-rejected' :
                claim.status === 'hearing_requested' ? 'status-hearing'  :
                'status-pending';

            // Show the relevant crypto key to the relevant admin
            let adminKeyNote = '';
            if (currentUser.role === 'ta'  && claim.status === 'pending_ta'  && claim.taCryptoKey)
                adminKeyNote = `<p><small style="color:red;"><b>TA Verify Key:</b> ${claim.taCryptoKey}</small></p>`;
            else if (currentUser.role === 'clb' && claim.status === 'pending_clb' && claim.clbCryptoKey)
                adminKeyNote = `<p><small style="color:red;"><b>CLB Verify Key:</b> ${claim.clbCryptoKey}</small></p>`;

            // Rejection reason notification for citizen
            let rejectionNote = '';
            if (claim.status === 'rejected' && claim.rejectionReason)
                rejectionNote = `<p class="rejection-reason"><b>Rejected:</b> ${claim.rejectionReason}</p>`;

            // Action buttons
            let actionBtns = '';
            if (currentUser.role === 'citizen' && isOwnClaim) {
                if (claim.status === 'pending_ta') {
                    actionBtns = `<button class="btn btn-remove" onclick="removeCitizenClaim('${claim._id}',event)">Remove Claim</button>`;
                } else if (claim.status === 'rejected') {
                    // Citizen can dismiss (permanently delete) a rejected notification
                    actionBtns = `<button class="btn btn-dismiss" onclick="dismissRejected('${claim._id}',event)">OK &ndash; Dismiss</button>`;
                }
            }

            sidebarHTML += `
                <div class="claim-card" onclick="navigateToClaim('${claim._id}')">
                    <h3>Claim: ${shortId(claim._id)}</h3>
                    <p><b>Date:</b> ${claim.date}</p>
                    <p><b>Size:</b> ${claim.area} ha</p>
                    <p><span class="status-badge ${badgeClass}">${claim.status.replace(/_/g, ' ').toUpperCase()}</span></p>
                    ${rejectionNote}
                    ${adminKeyNote}
                    ${actionBtns}
                </div>`;
        });

        document.getElementById('claims-list').innerHTML = sidebarHTML;
    }

    /** Shorten a claim _id for display */
    function shortId(id) {
        const parts = id.split('_');
        return parts.length > 1 ? parts[1].substring(0, 10) + '...' : id.substring(0, 14) + '...';
    }

    // ── Sidebar click → pan map to claim ──
    function navigateToClaim(claimId) {
        const layer = claimLayerMap[claimId];
        if (layer) {
            map.fitBounds(layer.getBounds(), { padding: [50, 50] });
            layer.eachLayer(l => { if (l.openPopup) l.openPopup(); });
        }
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  5. CITIZEN ACTIONS
    // ══════════════════════════════════════════════════════════════════════════

    /** Citizen removes their own pending claim */
    async function removeCitizenClaim(claimId, event) {
        event.stopPropagation();
        const yes = await mapConfirm("Are you sure you want to remove this claim?\nThis cannot be undone.");
        if (!yes) return;
        const claim = await db.get(claimId);
        await db.remove(claim);
        notify("Your claim has been removed.", 'success');
    }

    // Citizen dismisses a rejected claim notification
    async function dismissRejected(claimId, event) {
        event.stopPropagation();
        const claim = await db.get(claimId);
        await db.remove(claim);
        notify("Rejection dismissed.", 'info', 2500);
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  6. ADMIN VERIFICATION LOGIC
    // ══════════════════════════════════════════════════════════════════════════

    async function verifyAndApprove(claimId, role) {
        const enteredKey = (document.getElementById(`key-${claimId}`) || {}).value || '';
        const claim      = await db.get(claimId);
        const expectedKey = role === 'ta' ? claim.taCryptoKey : claim.clbCryptoKey;

        if (!enteredKey || enteredKey !== expectedKey) {
            return notify("Invalid Crypto Key. Verification failed.", 'error');
        }

        if (role === 'ta')  claim.status = 'pending_clb';
        if (role === 'clb') claim.status = 'approved';

        await db.put(claim);
        map.closePopup();
        notify(`Claim ${role.toUpperCase()} Approved.`, 'success');
        // loadClaims fires via debounced sync listener
    }

    async function rejectClaim(claimId, role) {
        const keyInput   = document.getElementById(`key-${claimId}`);
        const enteredKey = keyInput ? keyInput.value.trim() : '';
        const claim      = await db.get(claimId);
        const expectedKey = role === 'ta' ? claim.taCryptoKey : claim.clbCryptoKey;

        if (!enteredKey || enteredKey !== expectedKey) {
            return notify("You must enter a valid Crypto Key before denying a claim.", 'error');
        }

        const sure = await mapConfirm("Are you sure you want to deny this claim?");
        if (!sure) return;

        // CLB must provide a reason
        let rejectionReason = '';
        if (role === 'clb') {
            rejectionReason = await mapPrompt(
                "CLB Requirement: Please enter the reason for rejection.\n" +
                "This will be sent to the citizen as a notification."
            );
            if (!rejectionReason || !rejectionReason.trim()) {
                return notify("A rejection reason is required from the CLB.", 'error');
            }
        }

        claim.status          = 'rejected';
        claim.rejectionReason = (rejectionReason || `Denied by ${role.toUpperCase()}`).trim();
        await db.put(claim);
        map.closePopup();
        notify("Claim denied. The citizen will be notified.", 'warning');
    }

    // ══════════════════════════════════════════════════════════════════════════
    //  7. LIVE SYNC LISTENER (debounced)
    // ══════════════════════════════════════════════════════════════════════════
    db.changes({ since: 'now', live: true, include_docs: true }).on('change', () => {
        if (currentUser) scheduleLoadClaims();
    });

    </script>
</body>
</html>
